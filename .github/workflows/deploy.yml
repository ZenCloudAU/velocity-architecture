name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zencloudau/velocity-architecture
  RESOURCE_GROUP: vaf-rg
  CONTAINER_NAME: vaf-agentic-architect
  LOCATION: australiasoutheast

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete existing container (required to update image)
        run: |
          az container delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --yes 2>/dev/null || true

      - name: Deploy to Azure Container Instances
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN_VAL: ${{ secrets.GH_TOKEN }}
        run: |
          az container create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --registry-login-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password "$GH_TOKEN_VAL" \
            --ports 80 \
            --ip-address Public \
            --dns-name-label vaf-architect \
            --location ${{ env.LOCATION }} \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables NODE_ENV=production \
            --secure-environment-variables \
                "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" \
                "VAF_GITHUB_TOKEN=$GH_TOKEN_VAL" \
            --restart-policy Always

      - name: Show container FQDN
        run: |
          az container show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query ipAddress.fqdn \
            --output tsv
