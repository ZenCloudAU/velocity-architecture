<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Velocity Architecture — Document route</title><meta name="robots" content="noindex"><style>body{margin:0;background:#f1f5f9;color:#0f172a;font-family:Arial,sans-serif;display:grid;min-height:100vh;place-items:center}.box{max-width:680px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:2rem}a{color:#c45107}</style></head><body><main class="box"><h1 id="title">Opening document…</h1><p id="message">This compatibility route only opens documents that remain part of the public Velocity knowledge base.</p><p><a href="/">Return to the knowledge base</a></p></main><script>const routes={'AI_AND_CLIENT_DATA_USAGE_POLICY.md':'/policies/ai-and-client-data-usage-policy/','VELOCITY_AI_ARCHITECTURE_COORDINATION_LAYER.md':'/frameworks/ai-architecture-coordination-layer/','VELOCITY_EA_VALUE_METRICS.md':'/frameworks/ea-value-metrics/'};const key=new URLSearchParams(location.search).get('doc')||'';if(routes[key]){location.replace(routes[key])}else{document.getElementById('title').textContent='Document not published';document.getElementById('message').textContent='The requested working, commercial, internal or archived document is not part of the public Velocity knowledge base.'}</script></body></html>
